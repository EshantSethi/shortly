# ── Database ────────────────────────────────────────────────────────────────────
# PRODUCTION: set DB_USERNAME and DB_PASSWORD env vars — never use root/root123
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:urlshortener}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:${DB_USERNAME:root}}
spring.datasource.password=${MYSQLPASSWORD:${DB_PASSWORD:root123}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── Redis ───────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDISHOST:${REDIS_HOST:localhost}}
spring.data.redis.port=${REDISPORT:${REDIS_PORT:6379}}
spring.data.redis.password=${REDISPASSWORD:}

# ── Server ──────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ── App config ──────────────────────────────────────────────────────────────────
# PRODUCTION: set all three of these env vars
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
# PRODUCTION: set ALLOWED_ORIGINS to your exact frontend domain, e.g. https://shortly.yourdomain.com
app.allowed-origins=${ALLOWED_ORIGINS:*}
app.rate-limit.requests-per-minute=${RATE_LIMIT_RPM:20}

# ── Logging ─────────────────────────────────────────────────────────────────────
logging.level.com.urlshortener=INFO
