services:
  - type: web
    name: url-shortener-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: REDISPASSWORD
        sync: false
      - key: REDIS_SSL
        value: "true"
      - key: APP_BASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://frontend-seven-rosy-23.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://frontend-seven-rosy-23.vercel.app
      - key: PORT
        value: "8080"
